agent_id_key:
  ros__parameters:
    # dotOcean simulator enable/disable (resp. True/False)
    enable_dotocean_simulator: True
    # Fog Connection management:
    fog_connection_timeout: 5
    # Autonomy Connection management:
    autonomy_connection_timeout: 5
    # Task management:
    use_start_time: False
    # Waypoint management:
    objective_distance_tolerance: 8.0
    # Speed control:
    #    - mode 0 = based on given speed value (in task), unbound!
    #    - mode 1 = based on given speed value (in task), bound to max_speed = 10m/s
    #    - mode 2 = based on given speed value (in task), as an average value (try to keep average speed +- constant between two waypoints)
    #    - mode 3 = based on given eta (in task) 
    speed_control_mode: 0

    # TEST MODE
    # ==========
    # Testing Fog-less (= edge-only) with pre-defined waypoints
    edge_only_testing_mode: False
    # mobility profile of autonomy:
    # 0 = default
    # 2 = roads only
